<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Claude</title>
  <style>
    html, body {
      height: 100%;
      margin: 0;
    }
    body {
      background-color: #000000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Arial, sans-serif;
      gap: 24px;
      color: #ffffff;
    }
    h1 {
      color: #00eaff;
      font-size: 4rem;
      margin: 0;
      letter-spacing: 2px;
      text-shadow:
        0 0 5px #00eaff,
        0 0 10px #00eaff,
        0 0 20px #00eaff,
        0 0 40px #0099ff,
        0 0 80px #0099ff;
    }
    .subtitle {
      color: #9fdcff;
      font-size: 1.2rem;
      margin: 0;
      opacity: 0.85;
    }
    button {
      margin-top: 8px;
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: #ffffff;
      border: none;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 600;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(0, 150, 255, 0.4);
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 28px rgba(0, 150, 255, 0.6);
    }
    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <h1>Hello Claude</h1>
  <p class="subtitle">This website was created by Claude Code</p>
  <button>Get Started</button>
</body>
</html>
